directories:
  output: dist
  buildResources: build
appId: com.yourname.Sarathi
productName: Sarathi
files:
  - filter:
      - '**/*'
      - '!node_modules/.cache'
      - '!dist/**/*'
win:
  target: nsis
  icon: public/assets/icons/icons.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
electronVersion: 36.0.1
